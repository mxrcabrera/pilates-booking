name: Database Backup

on:
  schedule:
    # Ejecutar diariamente a las 03:00 AM UTC
    - cron: '0 3 * * *'
  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Database Backup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Ejecutar dump completo de la base de datos
          supabase db dump -p $SUPABASE_PROJECT_ID > backup.sql
          
          # Verificar que el dump se creó correctamente
          if [ ! -s backup.sql ]; then
            echo "Error: El archivo backup.sql está vacío o no se creó"
            exit 1
          fi
          
          echo "Backup completado exitosamente"
          ls -lh backup.sql
      
      - name: Compress Backup
        run: |
          # Comprimir el archivo con fecha
          tar -czvf backup-$(date +%Y-%m-%d).tar.gz backup.sql
          
          # Verificar que la compresión se creó correctamente
          if [ ! -s backup-$(date +%Y-%m-%d).tar.gz ]; then
            echo "Error: El archivo comprimido está vacío o no se creó"
            exit 1
          fi
          
          echo "Compresión completada exitosamente"
          ls -lh backup-*.tar.gz
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup-*.tar.gz
          retention-days: 90
          if-no-files-found: error
